<!doctype html><html lang="he" dir="rtl"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>צועדת</title>
<link rel="stylesheet" href="style.css">
</head><body>
<header><h1>🚶‍♀️ צועדת</h1><p id="greet">שלום, מירב</p></header>
<main>
<section class="card"><h2>היום</h2><p>הליכה 10 דקות בקצב נינוח</p><button id="startBtn">התחילי הליכה</button></section>
<section id="walk" class="card hidden">
<label>זמן הליכה <input id="minutes" type="number" min="1" max="999"></label>
<h3>מאמץ</h3><div id="effort"></div>
<h3>כאב</h3><div id="pain"></div>
<button id="saveBtn">שמירה</button>
</section>
<section class="card"><h2>יומן</h2><div id="log"></div></section>
</main>
<script src="script.js"></script>
</body></html>
