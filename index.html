<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>צועדת</title>

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">

    <meta name="theme-color" content="#8c52ff">
</head>

<body>

<div class="app">

    <header class="header">
        <h1>🚶‍♀️ צועדת</h1>
    </header>

    <button id="startBtn" class="primaryButton">
        התחילי הליכה
    </button>

    <div id="walkForm" class="card hidden">

        <label>
            זמן הליכה
            <input
                id="minutes"
                type="number"
                min="1"
                max="999"
                placeholder="דקות">
        </label>

        <h3>מאמץ</h3>
        <div id="effort" class="choices"></div>

        <h3>כאב</h3>
        <div id="pain" class="choices"></div>

        <button id="saveBtn" class="primaryButton">
            שמירה
        </button>

    </div>

    <div id="list"></div>

</div>

<!-- חלון מחיקה -->

<div id="dialog" class="dialog hidden">

    <div class="dialogCard">

        <h3>למחוק את ההליכה?</h3>

        <div class="dialogButtons">

            <button id="confirmDelete" class="dangerButton">
                מחיקה
            </button>

            <button id="cancelDelete" class="secondaryButton">
                ביטול
            </button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
